'$schema' = 'https://starship.rs/config-schema.json'

format = """
[в•ӯв•ҙ](cyan)\
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$jobs\
$status\
$cmd_duration\
\n\
[в”Ӯ ](cyan)\
[\
$direnv\
$nix_shell\
$mise\
$package\
$c\
$cpp\
$cmake\
$rust\
$zig\
$haskell\
$golang\
$nodejs\
$deno\
$java\
$kotlin\
$gradle\
$ruby\
$python\
$lua\
$custom\
](dimmed)\
\n\
[в•°в”„](cyan)\
$character"""

[character]
disabled = false
success_symbol = '[вһң](bold green)'
error_symbol = '[вһң](bold red)'

[username]
disabled = false
format = '[$user]($style)'
style_user = 'cyan bold'
style_root = 'red bold'
show_always = true

[hostname]
disabled = false
format = '[@](white)[$hostname]($style) '
style = 'green bold'
ssh_only = false
trim_at = ''

[directory]
disabled = false
format = '[$path]($style)[$read_only]($read_only_style) '
style = 'cyan bold'
read_only = ' у°Ңҫ'
read_only_style = 'yellow'

[git_branch]
disabled = false
format = '[$symbol$branch(:$remote_branch)]($style) '
style = 'purple bold'
symbol = 'у°ҳ¬ '

[git_commit]
disabled = false
format = '[$hash]($style) '
style = 'purple bold'
only_detached = false
commit_hash_length = 7

[git_state]
disabled = false
format = '[$state($progress_current/$progress_total)]($style) '
style = "yellow bold"

[git_status]
disabled = false
format = '[$all_status$ahead_behind]($style) '
style = 'yellow bold'

[jobs]
disabled = false
format = '[$symbol$number]($style) '
style = 'blue bold'
symbol = '"'
symbol_threshold = 1
number_threshold = 1

[status]
disabled = false
format = '[$symbol$status( ^$signal_name)]($style) '
style = "red bold"
symbol = '*'
signal_symbol = '*'
sigint_symbol = '*'
not_executable_symbol = '?'
not_found_symbol = '?'

[cmd_duration]
disabled = false
format = '[ у°”ӣ $duration]($style) '
style = 'yellow bold dimmed'
min_time = 2000

[direnv]
disabled = false
format = '[$symbol$loaded]($style) '
style = 'blue bold dimmed'
symbol = 'у°ҢӘ '
loaded_msg = 'direnv'
unloaded_msg = 'direnv?'
allowed_msg = 'direnv?'
denied_msg = 'direnv?'

[nix_shell]
disabled = false
format = '[$symbol$name]($style) '
style = 'blue bold dimmed'
symbol = 'уұ„… '

[mise]
disabled = false
format = '[$symbol$health]($style) '
style = "yellow dimmed"
symbol = 'у°ҷӣ '
healthy_symbol = 'mise'
unhealthy_symbol = 'mise?'

[package]
disabled = false
format = '[$symbol$version]($style) '
style = 'purple bold dimmed'
symbol = 'у°Ҹ– '

[c]
disabled = false
format = '[$symbol($version(-$name))]($style) '
style = 'cyan bold dimmed'
symbol = "у°ҷұ "

[cpp]
disabled = false
format = '[$symbol($version(-$name))]($style) '
style = 'cyan bold dimmed'
symbol = "у°ҷІ "

[cmake]
disabled = false
format = '[$symbol($version)]($style) '
style = 'cyan bold dimmed'
symbol = "оһ” "

[rust]
disabled = false
format = '[$symbol($version)]($style) '
style = 'red bold dimmed'
symbol = 'уұҳ— '

[zig]
disabled = false
format = '[$symbol($version)]($style) '
style = 'yellow bold dimmed'
symbol = 'оЈҜ '

[haskell]
disabled = false
format = '[$symbol($version)]($style) '
style = 'purple bold dimmed'
symbol = 'у°І’ '

[golang]
disabled = false
format = '[$symbol($version)]($style) '
style = 'blue bold dimmed'
symbol = "оҳ§ "

[java]
disabled = false
format = '[$symbol($version)]($style) '
style = 'red bold dimmed'
symbol = 'у°¬· '

[kotlin]
disabled = false
format = '[$symbol($version)]($style) '
style = 'blue bold dimmed'
symbol = 'уұҲҷ '

[gradle]
disabled = false
format = '[$symbol($version)]($style) '
style = 'cyan bold dimmed'
symbol = "оҹІ "

[nodejs]
disabled = false
format = '[$symbol($version)]($style) '
style = 'green bold dimmed'
symbol = 'у°Һҷ '

[deno]
disabled = false
format = '[$symbol($version)]($style) '
style = 'green bold dimmed'
symbol = "оҹҖ "

[ruby]
disabled = false
format = '[$symbol($version)]($style) '
style = 'red bold dimmed'
symbol = 'у°ҙӯ '

[python]
disabled = false
format = '[${symbol}${pyenv_prefix}${version}(\($virtualenv\))]($style) '
style = 'yellow bold dimmed'
symbol = 'у°Ң  '

[lua]
disabled = false
format = '[$symbol($version)]($style) '
style = 'blue bold dimmed'
symbol = 'у°ўұ '

[os]
disabled = true
format = '[$symbol]($style)]'
symbols = { AIX = 'AIX ', AlmaLinux = 'пҢқ ', Alpaquita = 'п…ј ', Alpine = 'пҢҖ ', Amazon = 'пү° ', Android = 'п…» ', Arch = 'пҢғ ', Artix = 'пҢҹ ', Bluefin = 'п…ј ', CachyOS = 'п…ј ', CentOS = 'пҢ„ ', Debian = 'пҢҶ ', DragonFly = 'о»ё ', Emscripten = 'пғҒ ', EndeavourOS = 'пҢў ', Fedora = 'пҢҠ ', FreeBSD = 'пҢҢ ', Garuda = 'пҢ· ', Gentoo = 'пҢҚ ', HardenedBSD = 'пҖ“ ', Illumos = 'пҢҰ ', Kali = 'пҢ§ ', Linux = 'п…ј ', Mabox = 'оөө ', Macos = 'пҢӮ ', Manjaro = 'пҢ’ ', Mariner = 'пҖ“ ', MidnightBSD = 'пҖ“ ', Mint = 'пҢҺ ', NetBSD = 'у°ӣі ', NixOS = 'пҢ“ ', Nobara = 'пҺҖ ', OpenBSD = 'пҢЁ ', OpenCloudOS = 'пғӮ ', OracleLinux = 'оЎҷ ', Pop = 'пҢӘ ', Raspbian = 'пҢ• ', RedHatEnterprise = 'пҢ– ', Redhat = 'пҢ– ', Redox = 'пҢЈ ', RockyLinux = 'пҢ« ', SUSE = 'пҢ” ', Solus = 'пҢӯ ', Ubuntu = 'пҢӣ ', Ultramarine = 'пҖ“ ', Unknown = 'пҖ“ ', Uos = 'U ', Void = 'пҢ®  ', Windows = 'п…ә ', openEuler = 'пҖ“ ', openSUSE = 'пҢ” ' }
